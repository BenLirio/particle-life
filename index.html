<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Particle Life</title>
  <meta property="og:title" content="Particle Life">
  <meta property="og:description" content="A living universe of coloured particles following simple attraction/repulsion rules. Tap cells to change the rules and watch the universe reshape itself.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://benlirio.com/particle-life/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="app.js" defer></script>
  <script src="feedback.js" defer></script>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="loading-screen">
    <div id="loading-text">summoning particle forces from the void...</div>
  </div>

  <div id="error-screen" style="display:none">
    <div id="error-text">canvas refused to initialise — try a different browser or device</div>
  </div>

  <div id="universe-banner">
    <span id="universe-name">—</span>
  </div>

  <div id="ui-panel">
    <div id="panel-header">
      <button id="panel-toggle" aria-label="Toggle controls">controls</button>
    </div>
    <div id="panel-body">

      <div id="rules-section">
        <div id="rules-caption">
          <span class="caption-line">tap a cell to flip: <span class="caption-attract">attract</span> / <span class="caption-ignore">ignore</span> / <span class="caption-repel">repel</span></span>
          <span class="caption-line caption-sub">row colour acts on column colour</span>
        </div>
        <div id="rules-grid" aria-label="Force matrix: rows act on columns. Tap a cell to change."></div>
      </div>

      <div class="panel-row">
        <label class="panel-label" for="select-preset">preset</label>
        <select id="select-preset">
          <option value="random">random</option>
          <option value="drifters">Drifters — gentle wandering</option>
          <option value="crystallizers">Crystallizers — lattice growth</option>
          <option value="predator-prey">Predator/Prey — chase loops</option>
          <option value="cells">Cells — membrane orbs</option>
          <option value="snakes">Snakes — long trailing chains</option>
          <option value="orbiters">Orbiters — color binary stars</option>
          <option value="exploders">Exploders — bursts &amp; voids</option>
          <option value="big-bang">Big Bang — ball that explodes</option>
          <option value="custom">Custom — your edited rules</option>
        </select>
      </div>

      <div class="panel-row">
        <label class="panel-label" for="select-spawn">spawn</label>
        <select id="select-spawn">
          <option value="scatter">scatter — evenly spread</option>
          <option value="ball">ball — tight cluster</option>
          <option value="ring">ring — hollow shell</option>
          <option value="stripes">stripes — color bands</option>
        </select>
      </div>

      <div class="panel-row">
        <label class="panel-label" for="select-mouse">mouse</label>
        <select id="select-mouse">
          <option value="repel">repel — push away</option>
          <option value="attract">attract — pull in</option>
          <option value="off">off — no interaction</option>
        </select>
      </div>

      <div class="panel-row panel-buttons">
        <button id="btn-random-rules">randomize</button>
        <button id="btn-reset">respawn</button>
        <button id="btn-screenshot">screenshot</button>
      </div>

      <button id="advanced-toggle" type="button" aria-expanded="false">advanced</button>
      <div id="advanced-body" hidden>
        <div class="panel-row">
          <label class="panel-label" for="slider-speed">speed</label>
          <input id="slider-speed" type="range" min="0.2" max="2" step="0.05" value="1">
        </div>
        <div class="panel-row">
          <label class="panel-label" for="slider-friction">friction</label>
          <input id="slider-friction" type="range" min="0.8" max="0.99" step="0.005" value="0.95">
        </div>
        <div class="panel-row">
          <label class="panel-label" for="slider-count">particles</label>
          <input id="slider-count" type="range" min="50" max="500" step="10" value="200">
        </div>
        <div class="panel-row panel-buttons">
          <button id="btn-share-rules">share ruleset link</button>
        </div>
      </div>

    </div>
  </div>
</body>
</html>
